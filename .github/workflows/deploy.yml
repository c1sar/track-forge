name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

# Evita despliegues concurrentes pisándose entre sí.
concurrency:
  group: deploy-cloudflare
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & format check
        run: pnpm run check

      - name: Type check
        run: pnpm exec astro check

      - name: Ensure Cloudflare resources (D1 + KV)
        run: node scripts/ensure-cf-resources.mjs

      - name: Apply D1 migrations
        run: pnpm exec wrangler d1 migrations apply DB --remote

      - name: Build
        run: pnpm run build

      # El deploy debe ir antes de subir secretos: `wrangler secret put`
      # requiere que el Worker ya exista.
      - name: Deploy
        run: pnpm exec wrangler deploy

      - name: Set runtime secrets
        env:
          TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        run: |
          printf '%s' "$TOKEN_ENCRYPTION_KEY" | pnpm exec wrangler secret put TOKEN_ENCRYPTION_KEY
          printf '%s' "$SESSION_SECRET" | pnpm exec wrangler secret put SESSION_SECRET
